[project]
name = "shared"
version = "0.1.0"
description = "Shared market-data models and ClickHouse client for TianguisWatt"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "clickhouse-connect>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
