name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: tianguiswatt
      CLICKHOUSE_PASSWORD: tianguiswatt
      CLICKHOUSE_DB: tianguiswatt
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.3
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_USER: tianguiswatt
          CLICKHOUSE_PASSWORD: tianguiswatt
          CLICKHOUSE_DB: tianguiswatt
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format (ruff)
        run: uv run ruff format --check .

      - name: Type-check (ty)
        run: uv run ty check

      - name: Test (pytest)
        run: uv run pytest

      - name: dbt build
        run: |
          uv run python -c "from shared.migrations.runner import migrate; print(migrate())"
          uv run dbt build --project-dir transform --profiles-dir transform

      - name: OpenAPI schema in sync with backend
        run: |
          uv run python -c "import json; from app.main import app; print(json.dumps(app.openapi(), indent=2, sort_keys=True))" > /tmp/openapi.json
          diff /tmp/openapi.json frontend/openapi.json

  frontend:
    name: Frontend (build, lint, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Generated client in sync with openapi.json
        run: |
          bun run gen:client
          git diff --exit-code src/client/schema.d.ts

      - name: Lint (oxlint)
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: bun run test:e2e
