    "httpx>=0.28.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "tenacity>=9.1.2",
]

[dependency-groups]
dev = [
    "dagster-dg-cli>=1.12.13",
]
