[project]
name = "orchestrator"
version = "0.1.0"
description = "Near-real-time energy market analytics orchestration"
authors = [{name = "Sebastian Arce", email='sebastianarce25@gmail.com'}]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dagster>=1.12.13",
